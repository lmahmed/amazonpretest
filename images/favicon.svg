<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#09090f"/>
  <!-- Book spine -->
  <rect x="14" y="6" width="3" height="20" rx="1" fill="#2a2a38"/>
  <!-- Left page -->
  <rect x="6" y="7" width="9" height="18" rx="2" fill="#f5a623"/>
  <!-- Right page -->
  <rect x="17" y="7" width="9" height="18" rx="2" fill="#ffcc66"/>
  <!-- Lines on left page -->
  <rect x="8" y="11" width="5" height="1.5" rx="0.75" fill="#09090f" opacity="0.4"/>
  <rect x="8" y="14" width="5" height="1.5" rx="0.75" fill="#09090f" opacity="0.4"/>
  <rect x="8" y="17" width="5" height="1.5" rx="0.75" fill="#09090f" opacity="0.4"/>
  <rect x="8" y="20" width="3" height="1.5" rx="0.75" fill="#09090f" opacity="0.4"/>
  <!-- Lines on right page -->
  <rect x="19" y="11" width="5" height="1.5" rx="0.75" fill="#09090f" opacity="0.3"/>
  <rect x="19" y="14" width="5" height="1.5" rx="0.75" fill="#09090f" opacity="0.3"/>
  <rect x="19" y="17" width="5" height="1.5" rx="0.75" fill="#09090f" opacity="0.3"/>
  <rect x="19" y="20" width="3" height="1.5" rx="0.75" fill="#09090f" opacity="0.3"/>
</svg>
